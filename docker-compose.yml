# Production deployment for PixiePost on Coolify/Hetzner.
# Based on the official Postiz compose stack:
# https://github.com/gitroomhq/postiz-docker-compose

services:
  postiz:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: always
    environment:
      # Public application URLs
      MAIN_URL: "https://pixiepost.pixiewire.com"
      FRONTEND_URL: "https://pixiepost.pixiewire.com"
      NEXT_PUBLIC_BACKEND_URL: "https://pixiepost.pixiewire.com/api"
      BACKEND_INTERNAL_URL: "http://localhost:3000"

      # Core services
      JWT_SECRET: "de8b2332617f10c93f573a4d87decca107cbc83f48f920c4cdeda0d54418f3fb6ad4c48ebeb743c1cdae56f58e4afb0d"
      DATABASE_URL: "postgresql://postiz-user:L1sxyn5cKlp1O6JSY4BkyWaobDbaockJ@postiz-postgres:5432/postiz-db-local"
      REDIS_URL: "${REDIS_URL:-redis://postiz-redis:6379}"
      TEMPORAL_ADDRESS: "${TEMPORAL_ADDRESS:-temporal:7233}"
      IS_GENERAL: "${IS_GENERAL:-true}"
      DISABLE_REGISTRATION: "true"
      RUN_CRON: "${RUN_CRON:-true}"

      # Storage
      STORAGE_PROVIDER: "${STORAGE_PROVIDER:-local}"
      UPLOAD_DIRECTORY: "${UPLOAD_DIRECTORY:-/uploads}"
      NEXT_PUBLIC_UPLOAD_DIRECTORY: "${NEXT_PUBLIC_UPLOAD_DIRECTORY:-/uploads}"
      NEXT_PUBLIC_UPLOAD_STATIC_DIRECTORY: "${NEXT_PUBLIC_UPLOAD_STATIC_DIRECTORY:-}"
      SERVER_PHOTOS_DIR: "${SERVER_PHOTOS_DIR:-/server-photos}"

      # Optional email settings
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      EMAIL_FROM_ADDRESS: "${EMAIL_FROM_ADDRESS:-}"
      EMAIL_FROM_NAME: "${EMAIL_FROM_NAME:-}"

      # Optional Cloudflare R2 settings
      CLOUDFLARE_ACCOUNT_ID: "${CLOUDFLARE_ACCOUNT_ID:-}"
      CLOUDFLARE_ACCESS_KEY: "${CLOUDFLARE_ACCESS_KEY:-}"
      CLOUDFLARE_SECRET_ACCESS_KEY: "${CLOUDFLARE_SECRET_ACCESS_KEY:-}"
      CLOUDFLARE_BUCKETNAME: "${CLOUDFLARE_BUCKETNAME:-}"
      CLOUDFLARE_BUCKET_URL: "${CLOUDFLARE_BUCKET_URL:-}"
      CLOUDFLARE_REGION: "${CLOUDFLARE_REGION:-auto}"

      # Social media API credentials - add the values in .env before enabling each integration.
      X_API_KEY: "u1U7tlJIQqGzWQ3AAI6CDy1vg"
      X_API_SECRET: "EzjCr9Y05fLeOqilzDgFsrrpHuqZ2Ln8jBdF16ghbWZyJXd419"
      LINKEDIN_CLIENT_ID: "${LINKEDIN_CLIENT_ID:-}"
      LINKEDIN_CLIENT_SECRET: "${LINKEDIN_CLIENT_SECRET:-}"
      REDDIT_CLIENT_ID: "${REDDIT_CLIENT_ID:-}"
      REDDIT_CLIENT_SECRET: "${REDDIT_CLIENT_SECRET:-}"
      GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID:-}"
      GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET:-}"
      BEEHIIVE_API_KEY: "${BEEHIIVE_API_KEY:-}"
      BEEHIIVE_PUBLICATION_ID: "${BEEHIIVE_PUBLICATION_ID:-}"
      LISTMONK_DOMAIN: "${LISTMONK_DOMAIN:-}"
      LISTMONK_USER: "${LISTMONK_USER:-}"
      LISTMONK_API_KEY: "${LISTMONK_API_KEY:-}"
      LISTMONK_LIST_ID: "${LISTMONK_LIST_ID:-}"
      THREADS_APP_ID: "${THREADS_APP_ID:-}"
      THREADS_APP_SECRET: "${THREADS_APP_SECRET:-}"
      FACEBOOK_APP_ID: "965496275968047"
      FACEBOOK_APP_SECRET: "f265998180ac4be5d82ec308acccf132"
      YOUTUBE_CLIENT_ID: "${YOUTUBE_CLIENT_ID:-}"
      YOUTUBE_CLIENT_SECRET: "${YOUTUBE_CLIENT_SECRET:-}"
      TIKTOK_CLIENT_ID: "${TIKTOK_CLIENT_ID:-}"
      TIKTOK_CLIENT_SECRET: "${TIKTOK_CLIENT_SECRET:-}"
      PINTEREST_CLIENT_ID: "${PINTEREST_CLIENT_ID:-}"
      PINTEREST_CLIENT_SECRET: "${PINTEREST_CLIENT_SECRET:-}"
      DRIBBBLE_CLIENT_ID: "${DRIBBBLE_CLIENT_ID:-}"
      DRIBBBLE_CLIENT_SECRET: "${DRIBBBLE_CLIENT_SECRET:-}"
      DISCORD_CLIENT_ID: "${DISCORD_CLIENT_ID:-}"
      DISCORD_CLIENT_SECRET: "${DISCORD_CLIENT_SECRET:-}"
      DISCORD_BOT_TOKEN_ID: "${DISCORD_BOT_TOKEN_ID:-}"
      SLACK_ID: "${SLACK_ID:-}"
      SLACK_SECRET: "${SLACK_SECRET:-}"
      SLACK_SIGNING_SECRET: "${SLACK_SIGNING_SECRET:-}"
      MASTODON_URL: "${MASTODON_URL:-https://mastodon.social}"
      MASTODON_CLIENT_ID: "${MASTODON_CLIENT_ID:-}"
      MASTODON_CLIENT_SECRET: "${MASTODON_CLIENT_SECRET:-}"

      # Browser extension integration
      EXTENSION_ID: "${EXTENSION_ID:-}"

      # AI and misc
      # WILL BE REPLACED WITH ANTHROPIC
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      NEXT_PUBLIC_DISCORD_SUPPORT: "${NEXT_PUBLIC_DISCORD_SUPPORT:-}"
      NEXT_PUBLIC_POLOTNO: "${NEXT_PUBLIC_POLOTNO:-}"
      NOT_SECURED: "${NOT_SECURED:-false}"
      API_LIMIT: "${API_LIMIT:-30}"

      # Payments
      FEE_AMOUNT: "${FEE_AMOUNT:-0.05}"
      STRIPE_PUBLISHABLE_KEY: "${STRIPE_PUBLISHABLE_KEY:-}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_SIGNING_KEY: "${STRIPE_SIGNING_KEY:-}"
      STRIPE_SIGNING_KEY_CONNECT: "${STRIPE_SIGNING_KEY_CONNECT:-}"

      # OAuth
      NEXT_PUBLIC_POSTIZ_OAUTH_DISPLAY_NAME: "${NEXT_PUBLIC_POSTIZ_OAUTH_DISPLAY_NAME:-Authentik}"
      NEXT_PUBLIC_POSTIZ_OAUTH_LOGO_URL: "${NEXT_PUBLIC_POSTIZ_OAUTH_LOGO_URL:-https://raw.githubusercontent.com/walkxcode/dashboard-icons/master/png/authentik.png}"
      POSTIZ_GENERIC_OAUTH: "${POSTIZ_GENERIC_OAUTH:-false}"
      POSTIZ_OAUTH_URL: "${POSTIZ_OAUTH_URL:-https://auth.example.com}"
      POSTIZ_OAUTH_AUTH_URL: "${POSTIZ_OAUTH_AUTH_URL:-https://auth.example.com/application/o/authorize}"
      POSTIZ_OAUTH_TOKEN_URL: "${POSTIZ_OAUTH_TOKEN_URL:-https://auth.example.com/application/o/token}"
      POSTIZ_OAUTH_USERINFO_URL: "${POSTIZ_OAUTH_USERINFO_URL:-https://authentik.example.com/application/o/userinfo}"
      POSTIZ_OAUTH_CLIENT_ID: "${POSTIZ_OAUTH_CLIENT_ID:-}"
      POSTIZ_OAUTH_CLIENT_SECRET: "${POSTIZ_OAUTH_CLIENT_SECRET:-}"
      POSTIZ_OAUTH_SCOPE: "${POSTIZ_OAUTH_SCOPE:-openid profile email}"

      # Sentry / monitoring
      NEXT_PUBLIC_SENTRY_DSN: "${NEXT_PUBLIC_SENTRY_DSN:-}"
      SENTRY_SPOTLIGHT: "${SENTRY_SPOTLIGHT:-0}"

      # Developer settings
      NX_ADD_PLUGINS: "${NX_ADD_PLUGINS:-false}"

      # Optional short link providers
      DUB_TOKEN: "${DUB_TOKEN:-}"
      DUB_API_ENDPOINT: "${DUB_API_ENDPOINT:-https://api.dub.co}"
      DUB_SHORT_LINK_DOMAIN: "${DUB_SHORT_LINK_DOMAIN:-dub.sh}"
      SHORT_IO_SECRET_KEY: "${SHORT_IO_SECRET_KEY:-}"
      KUTT_API_KEY: "${KUTT_API_KEY:-}"
      KUTT_API_ENDPOINT: "${KUTT_API_ENDPOINT:-https://kutt.it/api/v2}"
      KUTT_SHORT_LINK_DOMAIN: "${KUTT_SHORT_LINK_DOMAIN:-kutt.it}"
      LINK_DRIP_API_KEY: "${LINK_DRIP_API_KEY:-}"
      LINK_DRIP_API_ENDPOINT: "${LINK_DRIP_API_ENDPOINT:-https://api.linkdrip.com/v1/}"
      LINK_DRIP_SHORT_LINK_DOMAIN: "${LINK_DRIP_SHORT_LINK_DOMAIN:-dripl.ink}"
    volumes:
      - postiz-config:/config
      - postiz-uploads:/uploads
      - /opt/pw-photos:/server-photos:ro
    expose:
      - "5000"
    networks:
      - postiz-network
      - temporal-network
      - coolify
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.routers.pixiepost.rule=Host(`pixiepost.pixiewire.com`)
      - traefik.http.routers.pixiepost.entrypoints=https
      - traefik.http.routers.pixiepost.tls=true
      - traefik.http.services.pixiepost.loadbalancer.server.port=5000

  postiz-postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: "${POSTIZ_POSTGRES_PASSWORD:-L1sxyn5cKlp1O6JSY4BkyWaobDbaockJ}"
      POSTGRES_USER: "${POSTIZ_POSTGRES_USER:-postiz-user}"
      POSTGRES_DB: "${POSTIZ_POSTGRES_DB:-postiz-db-local}"
    volumes:
      - postgres-volume:/var/lib/postgresql/data
    networks:
      - postiz-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 5

  postiz-redis:
    image: redis:7.2
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - postiz-redis-data:/data
    networks:
      - postiz-network

  spotlight:
    image: ghcr.io/getsentry/spotlight:latest
    pull_policy: always
    restart: unless-stopped
    expose:
      - "8969"
    networks:
      - postiz-network

  temporal-elasticsearch:
    image: elasticsearch:7.17.27
    restart: always
    environment:
      cluster.routing.allocation.disk.threshold_enabled: "true"
      cluster.routing.allocation.disk.watermark.low: "512mb"
      cluster.routing.allocation.disk.watermark.high: "256mb"
      cluster.routing.allocation.disk.watermark.flood_stage: "128mb"
      discovery.type: "single-node"
      ES_JAVA_OPTS: "-Xms256m -Xmx256m"
      xpack.security.enabled: "false"
    networks:
      - temporal-network
    expose:
      - "9200"
    volumes:
      - temporal-elasticsearch-data:/usr/share/elasticsearch/data

  temporal-postgresql:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_PASSWORD: "${TEMPORAL_POSTGRES_PASSWORD:-XVq3pwmsplezrmGtSGU7GZiQGGmOLtQv}"
      POSTGRES_USER: "${TEMPORAL_POSTGRES_USER:-temporal}"
      POSTGRES_DB: "${TEMPORAL_POSTGRES_DB:-temporal}"
    networks:
      - temporal-network
    expose:
      - "5432"
    volumes:
      - temporal-postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.28.1
    restart: always
    depends_on:
      temporal-postgresql:
        condition: service_healthy
      temporal-elasticsearch:
        condition: service_started
    environment:
      - DB=${TEMPORAL_DB:-postgres12}
      - DB_PORT=${TEMPORAL_DB_PORT:-5432}
      - POSTGRES_USER=${TEMPORAL_POSTGRES_USER:-temporal}
      - POSTGRES_PWD=${TEMPORAL_POSTGRES_PASSWORD:-XVq3pwmsplezrmGtSGU7GZiQGGmOLtQv}
      - POSTGRES_SEEDS=${TEMPORAL_POSTGRES_SEEDS:-temporal-postgresql}
      - DYNAMIC_CONFIG_FILE_PATH=${TEMPORAL_DYNAMIC_CONFIG_FILE_PATH:-config/dynamicconfig/development-sql.yaml}
      - ENABLE_ES=${ENABLE_ES:-true}
      - ES_SEEDS=${ES_SEEDS:-temporal-elasticsearch}
      - ES_VERSION=${ES_VERSION:-v7}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
    networks:
      - postiz-network
      - temporal-network
    expose:
      - "7233"
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - /data/coolify/applications/w13p3iqa2bpukpcjcm1a8mow/dynamicconfig:/etc/temporal/config/dynamicconfig
    labels:
      kompose.volume.type: configMap

  temporal-admin-tools:
    image: temporalio/admin-tools:1.28.1-tctl-1.18.4-cli-1.4.1
    restart: unless-stopped
    environment:
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - TEMPORAL_CLI_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
    networks:
      - postiz-network
      - temporal-network
    stdin_open: true
    depends_on:
      - temporal
    tty: true

  temporal-ui:
    image: temporalio/ui:2.34.0
    restart: unless-stopped
    environment:
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - TEMPORAL_CORS_ORIGINS=${TEMPORAL_UI_CORS_ORIGINS:-https://pixiepost.pixiewire.com}
    networks:
      - postiz-network
      - temporal-network
    expose:
      - "8080"

volumes:
  postgres-volume:
    external: false
  postiz-redis-data:
    external: false
  postiz-config:
    external: false
  postiz-uploads:
    external: false
  temporal-elasticsearch-data:
    external: false
  temporal-postgresql-data:
    external: false

networks:
  coolify:
    external: true
  postiz-network:
    external: false
  temporal-network:
    driver: bridge
    name: temporal-network
